name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install tools
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@latest
          go install github.com/go-task/task/v3/cmd/task@latest

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build plugins
        run: task build:plugins

      - name: Build app
        run: wails3 build

      - name: Package
        run: |
          mkdir -p staging/bin/plugins
          cp bin/querybox staging/
          cp bin/plugins/* staging/bin/plugins/
          tar -czf querybox-linux-amd64.tar.gz -C staging .

      - uses: actions/upload-artifact@v4
        with:
          name: linux-artifact
          path: querybox-linux-amd64.tar.gz

  build-darwin:
    name: Build (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install tools
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@latest
          go install github.com/go-task/task/v3/cmd/task@latest

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build plugins
        run: task build:plugins

      - name: Build universal binary
        run: |
          GOARCH=amd64 wails3 build
          cp bin/querybox bin/querybox-amd64
          GOARCH=arm64 wails3 build
          cp bin/querybox bin/querybox-arm64
          lipo -create -output bin/querybox bin/querybox-amd64 bin/querybox-arm64

      - name: Create .app bundle
        run: |
          mkdir -p bin/querybox.app/Contents/MacOS/bin/plugins
          mkdir -p bin/querybox.app/Contents/Resources
          cp build/darwin/icons.icns bin/querybox.app/Contents/Resources/
          cp build/darwin/Assets.car bin/querybox.app/Contents/Resources/
          cp build/darwin/Info.plist bin/querybox.app/Contents/
          cp bin/querybox bin/querybox.app/Contents/MacOS/
          cp bin/plugins/* bin/querybox.app/Contents/MacOS/bin/plugins/
          codesign --force --deep --sign - bin/querybox.app

      - name: Package
        run: cd bin && zip -r ../querybox-darwin-universal.zip querybox.app

      - uses: actions/upload-artifact@v4
        with:
          name: darwin-artifact
          path: querybox-darwin-universal.zip

  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install NSIS
        run: |
          choco install nsis -y
          echo "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install tools
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@latest
          go install github.com/go-task/task/v3/cmd/task@latest

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build plugins
        run: task build:plugins

      - name: Build app
        run: wails3 build

      - name: Generate WebView2 bootstrapper
        run: wails3 generate webview2bootstrapper -dir build/windows/nsis

      - name: Build NSIS installer
        run: |
          $root = $pwd.Path
          makensis `
            "-DARG_WAILS_AMD64_BINARY=$root\bin\querybox.exe" `
            "-DARG_WAILS_PLUGINS_DIR=$root\bin\plugins" `
            "build\windows\nsis\project.nsi"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-artifact
          path: bin/querybox-amd64-installer.exe

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-linux, build-darwin, build-windows]
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          name: QueryBox ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            querybox-linux-amd64.tar.gz
            querybox-darwin-universal.zip
            querybox-windows-amd64-installer.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
